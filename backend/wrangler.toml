name = "spectral-gambit-api"
main = "worker.js"
compatibility_date = "2024-09-01"

# Create the DB once with:  wrangler d1 create spectral-gambit
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "spectral-gambit"
database_id = "REPLACE_WITH_ID_FROM_wrangler_d1_create"

# Apply the schema:  wrangler d1 execute spectral-gambit --file=schema.sql --remote
# Deploy:            wrangler deploy
